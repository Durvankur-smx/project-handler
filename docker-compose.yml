version: '3.9'

services:

  mysql:
    image: mysql:8
    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: kotlin2025
      MYSQL_DATABASE: projectdb

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins

    container_name: jenkins

    restart: always

    ports:
      - "8083:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    depends_on:
      - mysql

  app:
    image: projecttool

    container_name: projecttool-app

    restart: always

    ports:
      - "8082:8081"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/projectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kotlin2025

    depends_on:
      - mysql

volumes:
  mysql_data:
  jenkins_home: