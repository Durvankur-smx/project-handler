<div xmlns:th="http://www.thymeleaf.org">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-semibold mb-1">Projects</h2>
            <p class="text-muted mb-0">
                All projects you own, across their lifecycle.
            </p>
        </div>

        <a class="btn btn-primary"
           th:href="@{/projects/create(userId=${userId})}">
            <i class="bi bi-plus-lg me-1"></i>
            New Project
        </a>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(projects)}"
         class="alert alert-light border text-center p-5">
        <h5 class="mb-2">No projects found</h5>
        <p class="text-muted">
            You haven’t created any projects yet.
        </p>
        <a class="btn btn-outline-primary"
           th:href="@{/projects/create(userId=${userId})}">
            Create your first project
        </a>
    </div>

    <!-- PROJECT GRID -->
    <div class="row g-3" th:if="${!#lists.isEmpty(projects)}">
        <div class="col-md-4"
             th:each="p : ${projects}">

            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex flex-column">

                    <h5 class="mb-1" th:text="${p.name}">Project Name</h5>

                    <p class="text-muted small mb-3"
                       th:text="${p.description}">
                        Project description
                    </p>

                    <div class="mt-auto d-flex justify-content-between align-items-center">

    <span class="badge bg-success"
          th:if="${p.status.name() == 'ACTIVE'}">ACTIVE</span>

                        <span class="badge bg-secondary"
                              th:if="${p.status.name() == 'ARCHIVED'}">ARCHIVED</span>

                        <div class="d-flex gap-2">

                            <a class="text-decoration-none small"
                               th:href="@{/projects/details(projectId=${p.id}, userId=${userId})}">
                                View
                            </a>

                            <form th:if="${p.status.name() == 'ACTIVE'}"
                                  th:action="@{/projects/archive(userId=${userId}, projectId=${p.id})}"
                                  method="post">

                                <button class="btn btn-sm btn-outline-danger">
                                    Archive
                                </button>
                            </form>

                            <form th:if="${p.status.name() == 'ARCHIVED'}"
                                  th:action="@{/projects/restore(userId=${userId}, projectId=${p.id})}"
                                  method="post">

                                <button class="btn btn-sm btn-outline-secondary">
                                    Restore
                                </button>
                            </form>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>
