<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Project Tool</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- App CSS -->
    <link th:href="@{/css/app.css}" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fb;
        }
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #0f172a, #020617);
        }
        .sidebar a {
            color: #cbd5f5;
            text-decoration: none;
        }
        .sidebar a:hover {
            color: #ffffff;
        }
        .sidebar .active {
            background-color: rgba(255,255,255,0.1);
            border-radius: 6px;
        }
        .content-area {
            min-height: 100vh;
            padding: 32px;
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <aside class="sidebar text-white p-4">
        <h5 class="fw-semibold mb-4">Project Tool</h5>

        <nav class="nav flex-column gap-2">
            <a class="nav-link px-3 py-2 active"
               th:href="@{/dashboard(userId=${userId})}">
                <i class="bi bi-speedometer2 me-2"></i>
                Dashboard
            </a>

            <a class="nav-link px-3 py-2"
               th:href="@{/projects/create(userId=${userId})}">
                <i class="bi bi-folder-plus me-2"></i>
                New Project
            </a>

            <a class="nav-link px-3 py-2"
               th:href="@{/projects(userId=${userId})}">
                <i class="bi bi-folder me-2"></i>
                Projects
            </a>

        </nav>

        <hr class="border-secondary my-4">

        <div class="small text-secondary">
            <p class="mb-1">Enterprise Design</p>
            <p class="mb-0">Service-layer Authorization</p>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-fill content-area">
        <div th:replace="${content}"></div>
    </main>

</div>

</body>
</html>
